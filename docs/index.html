<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thai Neologism Translator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: 'Sarabun', sans-serif;
      background: #0f0f1a;
      color: #e8e8f0;
      padding: 16px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #a78bfa;
      letter-spacing: 0.3px;
    }
    textarea {
      width: 100%;
      height: 90px;
      background: #1e1e2e;
      border: 1px solid #3a3a5c;
      border-radius: 8px;
      color: #e8e8f0;
      font-size: 14px;
      font-family: inherit;
      padding: 10px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #7c3aed; }
    button {
      width: 100%;
      margin-top: 8px;
      padding: 9px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover  { background: #6d28d9; }
    button:active { background: #5b21b6; }
    #result {
      margin-top: 12px;
      background: #1e1e2e;
      border: 1px solid #3a3a5c;
      border-radius: 8px;
      padding: 12px;
      min-height: 48px;
      display: none;
    }
    .label {
      font-size: 11px;
      color: #7c7ca8;
      margin-bottom: 4px;
    }
    .output-text {
      font-size: 15px;
      color: #c4b5fd;
      line-height: 1.6;
    }
    .meta {
      margin-top: 8px;
      font-size: 11px;
      color: #6a6a8a;
    }
    .error {
      color: #f87171;
      font-size: 13px;
    }
    .loading { opacity: 0.6; }
  </style>
</head>
<body>
  <h1>🔤 Thai Neologism Translator</h1>

  <textarea id="input" placeholder="พิมพ์ภาษาวิบัติที่นี่...&#10;เช่น: แกร พรุ่งนี้ไปสยามมมมมกัลป๊ะ"></textarea>
  <button id="btn-translate">แปลภาษา</button>

  <div id="result">
    <div class="label">ผลการแปล</div>
    <div class="output-text" id="output-text"></div>
    <div class="meta" id="meta"></div>
  </div>

  <script src="app.js">
  </script>
</body>
</html>
